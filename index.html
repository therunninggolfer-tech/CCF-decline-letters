
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CCF Letter Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#eef2f5;min-height:100vh;}
@media print{
  @page{margin:0;size:A4 portrait;}
  body{background:white!important;}
  .no-print{display:none!important;}
  .letter-shell{box-shadow:none!important;border-radius:0!important;margin:0!important;max-width:100%!important;}
}
.spin{width:36px;height:36px;border:3px solid #6FB9D5;border-top-color:#366775;border-radius:50%;animation:rot .8s linear infinite;}
@keyframes rot{to{transform:rotate(360deg);}}
.btn{border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:9px 20px;border-radius:6px;transition:opacity .15s,transform .1s;}
.btn:hover{opacity:.85;transform:translateY(-1px);}
.btn-teal{background:#366775;color:white;}
.btn-gold{background:#987F40;color:white;}
.btn-blue{background:#1565c0;color:white;}
.btn-ghost{background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.4);}
.btn-sm{padding:7px 14px;font-size:12px;}
.deal-row{transition:background .12s;cursor:pointer;}
.deal-row:hover{background:#f0f7fa!important;}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.tag-decline{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:500;background:#fdecea;color:#c0392b;margin:2px 3px 2px 0;}
.tag-defer{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:500;background:#e3f2fd;color:#1565c0;margin:2px 3px 2px 0;}
.setup-card{background:white;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.10);padding:40px 44px;max-width:480px;width:100%;margin:60px auto;}
.input-field{width:100%;border:1.5px solid #ddd;border-radius:7px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .15s;}
.input-field:focus{border-color:#366775;}
.search-input{border:1.5px solid #ddd;border-radius:6px;padding:8px 14px;font-size:13px;width:200px;font-family:'DM Sans',sans-serif;outline:none;}
.search-input:focus{border-color:#366775;}
.month-select{border:1.5px solid #ddd;border-radius:6px;padding:8px 14px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;background:white;cursor:pointer;}
.tab-btn{border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:10px 28px;border-radius:0;background:transparent;color:rgba(255,255,255,.6);border-bottom:3px solid transparent;transition:all .15s;}
.tab-btn.active{color:white;border-bottom:3px solid #987F40;}
.tab-btn:hover{color:white;}
.letter-shell{max-width:700px;margin:0 auto;background:white;box-shadow:0 4px 28px rgba(0,0,0,.10);border-radius:4px;overflow:hidden;font-family:Calibri,sans-serif;}
.field-row{display:flex;align-items:flex-end;gap:6px;margin-bottom:2px;}
.field-value{border-bottom:1px solid #bbb;flex:1;min-height:22px;padding-bottom:2px;font-size:13px;}
.err-box{background:#fdecea;border:1px solid #f5c6cb;border-radius:8px;padding:14px 18px;color:#c0392b;margin-bottom:16px;font-size:13px;}
.col-hdr{display:grid;grid-template-columns:2fr 1.6fr 1.4fr 1fr 90px 80px;padding:9px 20px;background:#f8f9fa;border-bottom:1px solid #eee;font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px;}
.col-row{display:grid;grid-template-columns:2fr 1.6fr 1.4fr 1fr 90px 80px;padding:13px 20px;align-items:center;background:white;}
</style>
</head>

function fmtDate(s){
  if(!s)return"";
  const c=s.replace(/^"|"$/g,"").split("T")[0];
  if(!c||c==="null")return"";
  const d=new Date(c+"T00:00:00");
  return isNaN(d)?c:d.toLocaleDateString("en-ZA",{day:"2-digit",month:"long",year:"numeric"});
}
function today(){return new Date().toLocaleDateString("en-ZA",{day:"2-digit",month:"long",year:"numeric"});}
function sStyle(l){
  const v=(l||"").toLowerCase();
  if(v.includes("declined"))return"background:#fdecea;color:#c0392b";
  if(v.includes("approved"))return"background:#e8f5e9;color:#2e7d32";
  if(v.includes("pending"))return"background:#fff3e0;color:#e65100";
  if(v.includes("awaiting"))return"background:#e3f2fd;color:#1565c0";
  return"background:#f5f5f5;color:#555";
}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function generatePDF(deal, type) {

  // Company info
  doc.setFontSize(8);
  doc.setTextColor(80);
  doc.setFont("helvetica","normal");
  const info = "Custom Capital Finance (Pty) Ltd  Reg No 2003/025527/07";
  const info2 = "1st Floor, The Glasshouse, 309 Umhlanga Rocks Dr, Somerset Park, uMhlanga";
  const info3 = "Tel: 031 007 0777  |  queries@customcapital.co.za";
  doc.text(info,  W/2, y, {align:"center"}); y += 4;
  doc.text(info2, W/2, y, {align:"center"}); y += 4;

  const stampColor = isDecline ? [192,57,43] : [21,101,192];

  doc.setFontSize(14);
  doc.setFont("helvetica","bold");
  doc.text(stampText, W/2, y+7, {align:"center"});
  y += 14;

  // Sub text
  doc.setFontSize(9);
  doc.setTextColor(100);
  doc.setFont("helvetica","italic");
  doc.text("The following application has been " + (isDecline?"Declined":"Deferred"), W/2, y, {align:"center"});
  y += 10;

  // Divider
  doc.setDrawColor(180);
  doc.line(margin, y, W-margin, y);
  y += 7;

  // Fields
  doc.setFont("helvetica","normal");
  doc.setTextColor(50);
  doc.setFontSize(10);
  function field(label, value) {
    doc.setFont("helvetica","bold"); doc.text(label, margin, y);

    const lw = doc.getTextWidth(label) + 3;
    doc.text(value || "", margin + lw, y);

      const lines = doc.splitTextToSize("• " + r, cw);
      doc.text(lines, margin, y);
      y += lines.length * 5 + 1;
    });
    doc.setDrawColor(180);
    doc.line(margin, y+2, W-margin, y+2); y += 8;
  } else {
    doc.setDrawColor(180);
    doc.rect(margin, y, cw, Math.max(25, deal.reasons.length * 6 + 6));
    y += 4;
    deal.reasons.forEach(function(r) {
      const lines = doc.splitTextToSize("• " + r, cw - 4);
      doc.text(lines, margin+3, y);
      y += lines.length * 5 + 1;
    });

  }

  doc.rect(margin, y, 70, 10, "F");
  doc.setFont("helvetica","bold");
  doc.setTextColor(54,103,117);
  doc.setFontSize(11);
  doc.text("CCF", margin+5, y+7);
  y += 14;
  doc.setFont("helvetica","normal");
  doc.setTextColor(80);
  doc.setFontSize(9);
  doc.text("Custom Capital Finance (Pty) Ltd  Authorised Signatory", margin, y);
  y += 10;

  // Office use
  doc.setDrawColor(200);
  doc.line(margin, y, W-margin, y); y += 4;
  doc.setFontSize(8);
  doc.setTextColor(150);
  doc.text("For office use only:", margin, y); y += 5;
  doc.line(margin, y, W-margin-30, y);
  doc.line(W-margin-25, y, W-margin, y);
  y += 6;
  doc.text(isDecline?"Declined":"Deferred", margin, y);

// ── Send email via Cloudflare proxy ──────────────────────────────────────────
async function sendEmail(toAddress, subject, htmlBody, deal, type) {
  let pdfBase64 = null;
  let filename = null;
  try {
    pdfBase64 = generatePDF(deal, type);
    filename = (type==="decline"?"Decline":"Defer") + "_" + deal.name.replace(/[^a-zA-Z0-9]/g,"_") + ".pdf";
  } catch(e) {
    console.warn("PDF generation failed:", e.message);
  }
  const res = await fetch(PROXY_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ to: toAddress, subject: subject, body: htmlBody, pdfBase64: pdfBase64, filename: filename })
  });
  const data = await res.json().catch(function(){return{};});
  if (!res.ok) throw new Error(data.error || "Send failed: " + res.status);
  return true;
}

// ── Monday GraphQL ────────────────────────────────────────────────────────────
async function gql(token,query){
  const res=await fetch("https://api.monday.com/v2",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":token,"API-Version":"2024-01"},
    body:JSON.stringify({query:query})
  });
  if(!res.ok){const e=await res.json().catch(function(){return{};});throw new Error((e.errors&&e.errors[0]&&e.errors[0].message)||"Monday API error "+res.status);}
  const data=await res.json();
  if(data.errors)throw new Error(data.errors[0].message||"Monday API error");
  return data;
}

async function fetchGroupId(token,monthVal){
  const parts=monthVal.split("-");
  const year=parts[0],mon=parts[1];
  const d=new Date(parseInt(year),parseInt(mon)-1,1);
  const groupLabel=d.toLocaleDateString("en-ZA",{month:"long"})+" "+year;
  const data=await gql(token,"{boards(ids:"+BOARD_ID+"){groups{id title}}}");
  const groups=(data.data&&data.data.boards&&data.data.boards[0]&&data.data.boards[0].groups)||[];
  const match=groups.find(function(g){return g.title.toLowerCase()===groupLabel.toLowerCase();});
  return{groupId:match?match.id:null,groupLabel:groupLabel};
}

async function fetchGroupItems(token,groupId){
  let allItems=[],cursor=null;
  do {
    const cursorArg=cursor?", cursor: \""+cursor+"\"":"";
    const q="{boards(ids:"+BOARD_ID+"){groups(ids:[\""+groupId+"\"]){items_page(limit:500"+cursorArg+"){cursor items{id name column_values(ids:[\"dropdown1\",\"dropdown4\",\"text9\",\"registration_no_\",\"date_initiated\",\"status27\",\"email_mm2fr2bd\"]){id text value}}}}}}";
    const data=await gql(token,q);
    const page=(data.data&&data.data.boards&&data.data.boards[0]&&data.data.boards[0].groups&&data.data.boards[0].groups[0]&&data.data.boards[0].groups[0].items_page)||{};
    allItems=allItems.concat(page.items||[]);
    cursor=page.cursor||null;
  } while(cursor);
  return allItems;
}

function parseItems(items){
  const declined=[],deferred=[];
  items.forEach(function(item){
    const cols={};
    (item.column_values||[]).forEach(function(c){cols[c.id]=c;});
    const declineRaw=cols["dropdown1"]?cols["dropdown1"].text||"":"";
    const deferRaw=cols["dropdown4"]?cols["dropdown4"].text||"":"";
    const dateRaw=((cols["date_initiated"]?cols["date_initiated"].text:"")||((cols["date_initiated"]?cols["date_initiated"].value||"":"")).replace(/"/g,"")).split("T")[0];
    let statusIdx=null;
    try{statusIdx=JSON.parse((cols["status27"]?cols["status27"].value||"{}":"{}")).index;}catch(e){}
    const statusLabel=statusIdx!==null?(STATUS_MAP[statusIdx]||"Status "+statusIdx):(cols["status27"]?cols["status27"].text||"—":"—");
    let supplierEmail="";
    try{
      const ev=JSON.parse((cols["email_mm2fr2bd"]?cols["email_mm2fr2bd"].value||"{}":"{}"));
      supplierEmail=ev.email||(cols["email_mm2fr2bd"]?cols["email_mm2fr2bd"].text||"":"");
    }catch(e){supplierEmail=cols["email_mm2fr2bd"]?cols["email_mm2fr2bd"].text||"":"";}
    const base={id:item.id,name:item.name||"",supplier:cols["text9"]?cols["text9"].text||"":"",regNo:cols["registration_no_"]?cols["registration_no_"].text||"":"",dateInitiated:dateRaw||"",statusLabel:statusLabel,supplierEmail:supplierEmail};
    if(declineRaw.trim())declined.push(Object.assign({},base,{reasons:declineRaw.split(",").map(function(s){return s.trim();}).filter(Boolean)}));
    if(deferRaw.trim())deferred.push(Object.assign({},base,{reasons:deferRaw.split(",").map(function(s){return s.trim();}).filter(Boolean)}));
  });
  function srt(arr){return arr.sort(function(a,b){if(!a.dateInitiated)return 1;if(!b.dateInitiated)return -1;return b.dateInitiated.localeCompare(a.dateInitiated);});}
  return{declined:srt(declined),deferred:srt(deferred)};
}

async function load(){
  const token=S.token||localStorage.getItem(STORE_KEY);
  if(!token){set({phase:"setup"});return;}
  set({phase:"loading",err:null});
  try{
    const res=await fetchGroupId(token,S.month);
    if(!res.groupId){set({declineDeals:[],deferDeals:[],phase:"list",err:"No board group found for \""+res.groupLabel+"\"."});return;}
    const items=await fetchGroupItems(token,res.groupId);
    const parsed=parseItems(items);
    set({declineDeals:parsed.declined,deferDeals:parsed.deferred,phase:"list",err:null});
  }catch(e){set({phase:"list",err:"Could not load: "+e.message});}
}

  const reasons=d.reasons.map(function(r,i){return "<div style='padding:5px 0;font-size:13px;color:#333;"+(i<d.reasons.length-1?"border-bottom:1px solid #f0f0f0;":"")+"display:flex;gap:10px;align-items:flex-start;'><span style='color:"+bulletColor+";font-weight:700;line-height:1.6;'>•</span><span>"+esc(r)+"</span></div>";}).join("");
  const reasonsBlock=isDecline?"<div style='border-bottom:1px solid #bbb;padding-bottom:4px;'>"+reasons+"</div><div style='border-bottom:1px solid #bbb;padding-bottom:24px;margin-top:4px;'></div>":"<div style='border:1px solid #bbb;border-radius:2px;min-height:80px;padding:8px 10px;'>"+reasons+"</div>";
  const confirmBanner="<div class='no-print' style='max-width:700px;margin:16px auto 0;padding:0 20px;'><div style='background:"+(isDecline?"#e8f7ef":"#e3f2fd")+";border:1px solid "+(isDecline?"#b2dfdb":"#90caf9")+";border-radius:8px;padding:11px 16px;font-size:13px;color:"+(isDecline?"#2e7d6e":"#1565c0")+";display:flex;gap:10px;align-items:center;'><span style='font-size:16px;'>✓</span><span>"+stampText+" letter ready for <strong>"+esc(d.name)+"</strong></span></div></div>";
  const letter="<div style='padding:12px 20px 48px;'><div class='letter-shell'><div style='text-align:center;padding:32px 60px 0;'><img src='"+LOGO_SRC+"' alt='CCF' style='width:210px;height:auto;max-height:80px;object-fit:contain;display:block;margin:0 auto;'/></div><div style='padding:28px 60px 0;'><div style='background:"+stampColor+";color:white;text-align:center;font-size:17px;font-weight:800;letter-spacing:7px;padding:8px 0;border-radius:2px;margin-bottom:8px;'>"+stampText+"</div><div style='text-align:center;font-size:11.5px;color:#555;margin-bottom:28px;font-style:italic;'>"+subText+"</div><div style='border-top:1px solid #ccc;padding-top:18px;'><div class='field-row'><span style='font-size:13px;color:#333;font-weight:500;white-space:nowrap;min-width:100px;'>Date</span><div class='field-value'>"+(today())+"</div></div><div style='height:10px;'></div><div class='field-row'><span style='font-size:13px;color:#333;font-weight:500;white-space:nowrap;min-width:100px;'>Supplier</span><div class='field-value'>"+esc(d.supplier)+"</div></div><div style='height:10px;'></div><div class='field-row'><span style='font-size:13px;color:#333;font-weight:500;white-space:nowrap;'>Client name</span><div class='field-value'>"+esc(d.name)+"</div></div></div><div style='margin-top:24px;'><div style='font-size:13px;font-weight:600;color:#222;margin-bottom:10px;'>"+sectionLabel+"</div>"+reasonsBlock+"</div><div style='margin-top:48px;'><div style='background:#ddeef4;display:inline-block;padding:10px 32px;min-width:200px;margin-bottom:8px;border-radius:2px;'><div style='font-weight:700;font-size:14px;color:#366775;letter-spacing:1px;'>CCF</div></div><div style='font-size:12px;color:#444;margin-top:8px;'>Custom Capital Finance (Pty) Ltd Authorised Signatory</div></div><div style='margin-top:32px;border-top:1px solid #ddd;padding-top:12px;margin-bottom:40px;'><div style='font-size:11px;color:#aaa;margin-bottom:10px;'>For office use only:</div><div style='display:flex;gap:40px;'><div style='border-bottom:1px solid #aaa;width:300px;height:22px;'></div><div style='border-bottom:1px solid #aaa;width:120px;height:22px;'></div></div><div style='font-size:10px;color:#ccc;margin-top:8px;'>"+footerWord+"</div></div></div><div style='border-top:2px solid #5FC2A2;background:white;padding:10px 60px 16px;text-align:center;'><div style='font-size:10px;font-weight:700;color:#333;letter-spacing:.5px;margin-bottom:3px;'>Custom Capital Finance (Pty) Ltd: 2003/025527/07</div><div style='font-size:9px;color:#366775;margin-bottom:4px;'>www.customcapital.co.za</div><div style='font-size:9px;color:#555;line-height:1.7;'><strong>Durban</strong> : 1st Floor Unit 3a, Glass House Main Building, 309 Umhlanga Rocks Drive, 4319 | Tel : +27 (0) 31 007 0777<br/><strong>Gauteng</strong> : Unit E4 004B Summit Place E, 221 Garsfontein Road, Menlyn, Pretoria, 0063 | Tel : +27 (0) 10 070 2654<br/><strong>Directors: Chris Du Toit | Pierre du Toit</strong></div></div></div></div>";
  return hdr(true)+confirmBanner+emailBar+letter;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render(){
  let html="";
  if(S.phase==="setup")html=renderSetup();
  else if(S.phase==="loading")html="<div style='display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:320px;gap:16px;'>"+hdr(false)+"<div class='spin'></div><div style='color:#366775;font-weight:500;'>Loading deals...</div></div>";
  else if(S.phase==="list")html=renderList();
  else if(S.phase==="letter"&&S.selected)html=renderLetter();
  document.getElementById("app").innerHTML=html;
  bind();
}

// ── Event binding ─────────────────────────────────────────────────────────────
function bind(){
  var el;
  el=document.getElementById("btn-connect");
  if(el)el.addEventListener("click",function(){
    const t=(document.getElementById("token-in").value||"").trim();
    if(!t){set({err:"Please paste your Monday API token."});return;}
    localStorage.setItem(STORE_KEY,t);S.token=t;S.err=null;load();
  });
  el=document.getElementById("token-in");
  if(el)el.addEventListener("keydown",function(e){if(e.key==="Enter"){var b=document.getElementById("btn-connect");if(b)b.click();}});
  el=document.getElementById("btn-refresh");if(el)el.addEventListener("click",load);
  el=document.getElementById("btn-settings");if(el)el.addEventListener("click",function(){set({phase:"setup",err:null});});
  el=document.getElementById("btn-back");if(el)el.addEventListener("click",function(){set({phase:"list",selected:null,selectedType:null,emailTo:"",sending:false,sendResult:null});});
  el=document.getElementById("btn-print");if(el)el.addEventListener("click",function(){window.print();});
  el=document.getElementById("tab-decline");if(el)el.addEventListener("click",function(){set({tab:"decline",search:""});});
  el=document.getElementById("tab-defer");if(el)el.addEventListener("click",function(){set({tab:"defer",search:""});});
  el=document.getElementById("month-sel");if(el)el.addEventListener("change",function(e){S.month=e.target.value;load();});
  el=document.getElementById("search-in");if(el)el.addEventListener("input",function(e){set({search:e.target.value});});
  el=document.getElementById("email-to");
  if(el)el.addEventListener("input",function(e){
    S.emailTo=e.target.value;
    const btn=document.getElementById("btn-send");
    if(btn)btn.style.opacity=e.target.value.trim()?"1":"0.4";
  });
  el=document.getElementById("btn-send");
  if(el)el.addEventListener("click",function(){handleSend();});
  document.querySelectorAll(".btn-open").forEach(function(b){
    b.addEventListener("click",function(e){
      e.stopPropagation();
      const deals=S.tab==="decline"?S.declineDeals:S.deferDeals;
      const d=deals.find(function(x){return x.id===b.dataset.id;});
      if(d)set({phase:"letter",selected:d,selectedType:S.tab,emailTo:d.supplierEmail||"",sending:false,sendResult:null});
    });
  });
  document.querySelectorAll(".deal-row").forEach(function(r){
    r.addEventListener("click",function(){
      const deals=S.tab==="decline"?S.declineDeals:S.deferDeals;
      const d=deals.find(function(x){return x.id===r.dataset.id;});
      if(d)set({phase:"letter",selected:d,selectedType:S.tab,emailTo:d.supplierEmail||"",sending:false,sendResult:null});
    });
  });
}

S.token=localStorage.getItem(STORE_KEY)||"";
if(S.token){load();}else{render();}
</script>
</body>
</html>
