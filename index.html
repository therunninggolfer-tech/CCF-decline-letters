
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CCF Letter Generator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#eef2f5;min-height:100vh;}
@media print{
  @page{margin:0;size:A4 portrait;}
  body{background:white!important;}
  .no-print{display:none!important;}
  .letter-shell{box-shadow:none!important;border-radius:0!important;margin:0!important;max-width:100%!important;}
  /* Hide placeholders in printed output - they should never appear in the PDF */
  input::placeholder, textarea::placeholder{color:transparent!important;opacity:0!important;}
  input::-webkit-input-placeholder, textarea::-webkit-input-placeholder{color:transparent!important;opacity:0!important;}
  input::-moz-placeholder, textarea::-moz-placeholder{color:transparent!important;opacity:0!important;}
  /* Strip form-control styling so inputs/textareas blend into the printed letter */
  input, textarea, select{border:none!important;background:transparent!important;box-shadow:none!important;outline:none!important;-webkit-appearance:none!important;appearance:none!important;}
  /* Empty inputs/textareas should not reserve space */
  textarea:placeholder-shown{min-height:0!important;height:auto!important;}
}
.spin{width:36px;height:36px;border:3px solid #6FB9D5;border-top-color:#366775;border-radius:50%;animation:rot .8s linear infinite;}
@keyframes rot{to{transform:rotate(360deg);}}
.btn{border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:9px 20px;border-radius:6px;transition:opacity .15s,transform .1s;}
.btn:hover{opacity:.85;transform:translateY(-1px);}
.btn-teal{background:#366775;color:white;}
.btn-gold{background:#987F40;color:white;}
.btn-blue{background:#1565c0;color:white;}
.btn-green{background:#5FC2A2;color:white;}
.btn-ghost{background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.4);}
.btn-sm{padding:7px 14px;font-size:12px;}
.deal-row{transition:background .12s;cursor:pointer;}
.deal-row:hover{background:#f0f7fa!important;}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.tag-decline{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:500;background:#fdecea;color:#c0392b;margin:2px 3px 2px 0;}
.tag-defer{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:500;background:#e3f2fd;color:#1565c0;margin:2px 3px 2px 0;}
.tag-approve{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:500;background:#e8f5e9;color:#2e7d32;margin:2px 3px 2px 0;}
.setup-card{background:white;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.10);padding:40px 44px;max-width:480px;width:100%;margin:60px auto;}
.input-field{width:100%;border:1.5px solid #ddd;border-radius:7px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .15s;}
.input-field:focus{border-color:#366775;}
.search-input{border:1.5px solid #ddd;border-radius:6px;padding:8px 14px;font-size:13px;width:200px;font-family:'DM Sans',sans-serif;outline:none;}
.search-input:focus{border-color:#366775;}
.month-select{border:1.5px solid #ddd;border-radius:6px;padding:8px 14px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;background:white;cursor:pointer;}
.tab-btn{border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:10px 24px;border-radius:0;background:transparent;color:rgba(255,255,255,.6);border-bottom:3px solid transparent;transition:all .15s;}
.tab-btn.active{color:white;border-bottom:3px solid #987F40;}
.tab-btn:hover{color:white;}
.letter-shell{max-width:700px;margin:0 auto;background:white;box-shadow:0 4px 28px rgba(0,0,0,.10);border-radius:4px;overflow:hidden;font-family:Calibri,sans-serif;}
.field-row{display:flex;align-items:flex-end;gap:6px;margin-bottom:2px;}
.field-value{border-bottom:1px solid #bbb;flex:1;min-height:22px;padding-bottom:2px;font-size:13px;}
.err-box{background:#fdecea;border:1px solid #f5c6cb;border-radius:8px;padding:14px 18px;color:#c0392b;margin-bottom:16px;font-size:13px;}
.col-hdr{display:grid;grid-template-columns:2fr 1.6fr 1.4fr 1fr 90px 80px;padding:9px 20px;background:#f8f9fa;border-bottom:1px solid #eee;font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px;}
.col-row{display:grid;grid-template-columns:2fr 1.6fr 1.4fr 1fr 90px 80px;padding:13px 20px;align-items:center;background:white;}
.col-hdr-app{display:grid;grid-template-columns:2fr 1.4fr 1.4fr 1fr 1fr 80px;padding:9px 20px;background:#f8f9fa;border-bottom:1px solid #eee;font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px;}
.col-row-app{display:grid;grid-template-columns:2fr 1.4fr 1.4fr 1fr 1fr 80px;padding:13px 20px;align-items:center;background:white;}
.cbx{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:11px;color:#222;user-select:none;line-height:1.2;}
.cbx-box{width:14px;height:14px;border:1px solid #888;border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:white;}
.cbx.checked .cbx-box{background:white;border-color:#222;}
.cbx.checked .cbx-box::after{content:"✓";color:#222;font-weight:700;font-size:12px;line-height:1;}
.app-input{width:100%;border:none;border-bottom:1px solid #888;padding:2px 4px;font-family:Calibri,sans-serif;font-size:13px;outline:none;background:transparent;}
.app-input:focus{border-bottom-color:#366775;background:#fafcff;}
.cond-textarea{width:100%;border:none;padding:2px 0;font-family:Calibri,sans-serif;font-size:12px;outline:none;background:transparent;resize:none;color:#1a1a1a;font-weight:600;line-height:1.5;overflow:hidden;}
.cond-textarea:focus{background:#fafcff;}
.eq-textarea{width:100%;border:none;padding:4px 0;font-family:Calibri,sans-serif;font-size:13px;outline:none;background:transparent;resize:none;text-align:center;line-height:1.6;overflow:hidden;}
.eq-textarea:focus{background:#fafcff;}
</style>
</head>

  if(!c||c==="null")return"";
  const d=new Date(c+"T00:00:00");
  return isNaN(d)?c:d.toLocaleDateString("en-ZA",{day:"2-digit",month:"long",year:"numeric"});
}

<script>
// ── Monday GraphQL ────────────────────────────────────────────────────────────
async function gql(token,query){
  const res=await fetch("https://api.monday.com/v2",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":token,"API-Version":"2024-01"},
    body:JSON.stringify({query:query})
  });
  if(!res.ok){const e=await res.json().catch(function(){return{};});throw new Error((e.errors&&e.errors[0]&&e.errors[0].message)||"Monday API error "+res.status);}
  const data=await res.json();
  if(data.errors)throw new Error(data.errors[0].message||"Monday API error");
  return data;
}

// Fetch all items for a given month by filtering on date_initiated, regardless of group.
// This is robust to monday.com automations that move items between groups after status changes.
async function fetchMonthItems(token,monthVal){
  const parts=monthVal.split("-");
  const year=parseInt(parts[0]),mon=parseInt(parts[1]);
  // Compute first day of month and first day of next month (exclusive upper bound)
  const startDate=year+"-"+String(mon).padStart(2,"0")+"-01";
  const nextMon=mon===12?1:mon+1;
  const nextYear=mon===12?year+1:year;
  const endDate=nextYear+"-"+String(nextMon).padStart(2,"0")+"-01";

  const colIds=[
    "dropdown1","dropdown4","text9","registration_no_","date_initiated","status27",
    "email_mm2fr2bd","long_text_mm31n1e","numeric_mm31xh21","numeric_mm31wq5r",
    "numeric_mm317q97","long_text_mm31hyds","dropdown_mm315mbh","formula_mm31x3zf",
    "numeric_mm31bz5v","numeric_mm312190","numeric_mm31d5he","recourse8","payout"
  ];
  const colArg='[\"'+colIds.join('\",\"')+'\"]';

  // Build a query_params filter on date_initiated using BETWEEN
  // Monday GraphQL items_page query_params syntax for date BETWEEN: rules with compare_value as ["YYYY-MM-DD", "YYYY-MM-DD"]
  const queryParams='{rules:[{column_id:\"date_initiated\",compare_value:[\"'+startDate+'\",\"'+endDate+'\"],operator:between}]}';

  let allItems=[],cursor=null,pageCount=0;
  do {
    const cursorArg=cursor?", cursor: \""+cursor+"\"":"";
    // First page uses query_params; subsequent pages use only cursor (Monday requirement)
    const filterArg=cursor?"":(", query_params: "+queryParams);
    const q="{boards(ids:"+BOARD_ID+"){items_page(limit:500"+filterArg+cursorArg+"){cursor items{id name column_values(ids:"+colArg+"){id text value}}}}}";
    const data=await gql(token,q);
    const page=(data.data&&data.data.boards&&data.data.boards[0]&&data.data.boards[0].items_page)||{};
    allItems=allItems.concat(page.items||[]);
    cursor=page.cursor||null;
    pageCount++;
    if(pageCount>20)break; // safety: 20 pages = 10,000 items max
  } while(cursor);
  return allItems;
}

function getNum(col){
  if(!col)return"";
  // Try text first, but strip currency symbols, spaces and thousand separators
  if(col.text!==undefined&&col.text!==null&&col.text!==""&&col.text!=="null"){
    const cleaned=String(col.text).replace(/[R\s,]/g,"").trim();
    if(cleaned!==""&&!isNaN(Number(cleaned)))return Number(cleaned);
    return col.text;
  }
  try{const v=JSON.parse(col.value||"null");if(v===null||v===undefined)return"";return v;}catch(e){return"";}
}
function getText(col){if(!col)return"";return col.text||"";}

function parseItems(items){
  const declined=[],deferred=[],approved=[];
  items.forEach(function(item){
    const cols={};
    (item.column_values||[]).forEach(function(c){cols[c.id]=c;});

    const declineRaw=getText(cols["dropdown1"]);
    const deferRaw=getText(cols["dropdown4"]);
    const dateRaw=(getText(cols["date_initiated"])||(cols["date_initiated"]?(cols["date_initiated"].value||""):"").replace(/"/g,"")).split("T")[0];

    let statusIdx=null;
    try{statusIdx=JSON.parse((cols["status27"]?cols["status27"].value||"{}":"{}")).index;}catch(e){}
    const statusLabel=statusIdx!==null?(STATUS_MAP[statusIdx]||"Status "+statusIdx):getText(cols["status27"])||"—";

    let supplierEmail="";
    try{
      const ev=JSON.parse((cols["email_mm2fr2bd"]?cols["email_mm2fr2bd"].value||"{}":"{}"));
      supplierEmail=ev.email||getText(cols["email_mm2fr2bd"]);
    }catch(e){supplierEmail=getText(cols["email_mm2fr2bd"]);}

    const base={
      id:item.id,
      name:item.name||"",
      supplier:getText(cols["text9"]),
      regNo:getText(cols["registration_no_"]),
      dateInitiated:dateRaw||"",
      statusLabel:statusLabel,
      statusIdx:statusIdx,
      supplierEmail:supplierEmail
    };

    if(declineRaw.trim()){
      declined.push(Object.assign({},base,{reasons:declineRaw.split(",").map(function(s){return s.trim();}).filter(Boolean)}));
    }
    if(deferRaw.trim()){
      deferred.push(Object.assign({},base,{reasons:deferRaw.split(",").map(function(s){return s.trim();}).filter(Boolean)}));
    }
    // Approval tab: status index 1 (Approved) and 6 (Approval Recourse)
    // Approval tab: deals in "Awaiting Approval" (0), "Pending FM" (11), "Pending TP" (13),
    // or where Application Specialist set status to "Generate Letter" (108).
    // These are all active queues where the proposed approval letter may need to be generated/edited.
    if(statusIdx===0||statusIdx===11||statusIdx===13||statusIdx===108){
      approved.push(Object.assign({},base,{
        settlement:getText(cols["long_text_mm31n1e"]),
        equipmentSchedule:getText(cols["long_text_mm31hyds"]),
        factor:getNum(cols["numeric_mm31xh21"]),
        period:getNum(cols["numeric_mm31wq5r"]),
        escalation:getNum(cols["numeric_mm317q97"]),
        rental:getNum(cols["numeric_mm31bz5v"]),
        payout:(function(){
          const newP=getNum(cols["formula_mm31x3zf"]);
          if(newP!==""&&newP!==null&&!isNaN(Number(newP)))return newP;
          return getNum(cols["payout"]);
        })(),
        docFee:getNum(cols["numeric_mm312190"]),
        rentalInclIns:getNum(cols["numeric_mm31d5he"]),
        recourse:getNum(cols["recourse8"]),
        approvalConditions:getText(cols["dropdown_mm315mbh"])
      }));
    }
  });
  function srt(arr){return arr.sort(function(a,b){if(!a.dateInitiated)return 1;if(!b.dateInitiated)return -1;return b.dateInitiated.localeCompare(a.dateInitiated);});}
  return{declined:srt(declined),deferred:srt(deferred),approved:srt(approved)};
}

async function load(){
  const token=S.token||localStorage.getItem(STORE_KEY);
  if(!token){set({phase:"setup"});return;}
  set({phase:"loading",err:null});
  try{
    const items=await fetchMonthItems(token,S.month);
    const parsed=parseItems(items);
    set({declineDeals:parsed.declined,deferDeals:parsed.deferred,approveDeals:parsed.approved,phase:"list",err:null});
  }catch(e){set({phase:"list",err:"Could not load: "+e.message});}
}

    doc.text(APPROVAL_CHECKS[idx], margin+102, cbY2);

  doc.setDrawColor(95,194,162);
  doc.setLineWidth(0.8);
  doc.line(margin, footerY, W-margin, footerY);

  return doc.output("datauristring").split(",")[1];

function drawCheckbox(doc, x, y, checked) {
  doc.setDrawColor(80);
  doc.setLineWidth(0.3);
  doc.rect(x, y, 4, 4);
  if (checked) {
    // Draw a clean vector tick mark (no Unicode reliance)
    doc.setDrawColor(34, 34, 34);
    doc.setLineWidth(0.55);
    doc.line(x + 0.7, y + 2.2, x + 1.7, y + 3.2);
    doc.line(x + 1.7, y + 3.2, x + 3.5, y + 0.9);
    doc.setLineWidth(0.3);
  }
}

async function sendEmail(toAddress, subject, htmlBody, deal, type, edit) {
  let pdfBase64 = null;
  let filename = null;
  try {
    if(type==="approve"){
      pdfBase64 = generateApprovalPDF(deal, edit);
      filename = "Approval_" + deal.name.replace(/[^a-zA-Z0-9]/g,"_") + ".pdf";
    } else {
      pdfBase64 = generatePDF(deal, type);
      filename = (type==="decline"?"Decline":"Defer") + "_" + deal.name.replace(/[^a-zA-Z0-9]/g,"_") + ".pdf";
    }
  } catch(e) {
    console.warn("PDF generation failed:", e.message);
  }
  const res = await fetch(PROXY_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ to: toAddress, subject: subject, body: htmlBody, pdfBase64: pdfBase64, filename: filename })
  });
  const data = await res.json().catch(function(){return{};});
  if (!res.ok) throw new Error(data.error || "Send failed: " + res.status);
  return true;
}

async function handleSend(){
  const emailTo=(S.emailTo||"").trim();
  if(!emailTo){alert("Please enter a supplier email address.");return;}
  set({sending:true,sendResult:null});
  try{
    const subject=S.selected.name + (S.selectedType==="approve"?" - Approval":(S.selectedType==="decline"?" - Decline":" - Deferral"));
    const htmlBody=buildEmailBody(S.selected,S.selectedType,S.appEdit);
    await sendEmail(emailTo,subject,htmlBody,S.selected,S.selectedType,S.appEdit);
    set({sending:false,sendResult:"success"});
  }catch(e){
    set({sending:false,sendResult:"error:"+e.message});
  }
}

function downloadAnyPDF(){
  try{
    let b64, prefix;
    if(S.selectedType==="approve"){
      b64=generateApprovalPDF(S.selected,S.appEdit);
      prefix="Approval";
    } else if(S.selectedType==="decline"){
      b64=generatePDF(S.selected,"decline");
      prefix="Decline";
    } else {
      b64=generatePDF(S.selected,"defer");
      prefix="Defer";
    }
    const link=document.createElement("a");
    link.href="data:application/pdf;base64,"+b64;
    link.download=prefix+"_"+S.selected.name.replace(/[^a-zA-Z0-9]/g,"_")+".pdf";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }catch(e){alert("PDF generation failed: "+e.message);}
}

<script>
// ── Build initial editable state for an approval deal ─────────────────────────
function buildAppEdit(d){
  // Auto-populate cond1 from approvalConditions + recourse
  let cond1="";
  if(d.approvalConditions){cond1=d.approvalConditions;}
  if(d.recourse&&Number(d.recourse)>0){
    const recStr=Number(d.recourse)+"% RECOURSE";
    cond1=cond1?(cond1+" / "+recStr):recStr;
  }
  return {
    date: todayShort(),
    supplierEmail: d.supplierEmail || "",
    attention: "",
    supplier: d.supplier || "",
    clientName: d.name || "",
    regNo: d.regNo || "NA",
    equipmentSchedule: d.equipmentSchedule || "",
    payout: d.payout || "",
    settlement: d.settlement || "",
    escalation: d.escalation || "",
    rental: d.rental || "",
    factor: d.factor || "",
    period: d.period || "",
    rentalInclIns: d.rentalInclIns || "",
    docFee: d.docFee || "",
    cond1: cond1,
    cond2: "",
    checks: APPROVAL_CHECKS.map(function(){return true;})
  };
}

// ── Master render ─────────────────────────────────────────────────────────────
function render(){
  let html="";
  if(S.phase==="setup")html=renderSetup();
  else if(S.phase==="loading")html=hdr(false)+"<div style='display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:320px;gap:16px;'><div class='spin'></div><div style='color:#366775;font-weight:500;'>Loading deals...</div></div>";
  else if(S.phase==="list")html=renderList();
  else if(S.phase==="letter"&&S.selected){
    if(S.selectedType==="approve")html=renderLetterApproval();
    else html=renderLetterDeclineDefer();
  }
  document.getElementById("app").innerHTML=html;
  bind();
}

// ── Event binding ─────────────────────────────────────────────────────────────
function bind(){
  var el;
  // Setup
  el=document.getElementById("btn-connect");
  if(el)el.addEventListener("click",function(){
    const t=(document.getElementById("token-in").value||"").trim();
    if(!t){set({err:"Please paste your Monday API token."});return;}
    localStorage.setItem(STORE_KEY,t);S.token=t;S.err=null;load();
  });
  el=document.getElementById("token-in");
  if(el)el.addEventListener("keydown",function(ev){if(ev.key==="Enter"){var b=document.getElementById("btn-connect");if(b)b.click();}});

  // Header
  el=document.getElementById("btn-refresh");if(el)el.addEventListener("click",load);
  el=document.getElementById("btn-settings");if(el)el.addEventListener("click",function(){set({phase:"setup",err:null});});
  el=document.getElementById("btn-back");if(el)el.addEventListener("click",function(){set({phase:"list",selected:null,selectedType:null,emailTo:"",sending:false,sendResult:null,appEdit:null});});
  el=document.getElementById("btn-print");if(el)el.addEventListener("click",function(){window.print();});
  el=document.getElementById("btn-download");if(el)el.addEventListener("click",downloadAnyPDF);

  // Tabs
  el=document.getElementById("tab-decline");if(el)el.addEventListener("click",function(){set({tab:"decline",search:""});});
  el=document.getElementById("tab-defer");if(el)el.addEventListener("click",function(){set({tab:"defer",search:""});});
  el=document.getElementById("tab-approve");if(el)el.addEventListener("click",function(){set({tab:"approve",search:""});});

  // List controls
  el=document.getElementById("month-sel");if(el)el.addEventListener("change",function(ev){S.month=ev.target.value;load();});
  el=document.getElementById("search-in");if(el)el.addEventListener("input",function(ev){set({search:ev.target.value});});

  // Email
  el=document.getElementById("email-to");
  if(el)el.addEventListener("input",function(ev){
    S.emailTo=ev.target.value;
    const btn=document.getElementById("btn-send");
    if(btn)btn.style.opacity=ev.target.value.trim()?"1":"0.4";
  });
  el=document.getElementById("btn-send");if(el)el.addEventListener("click",function(){handleSend();});

  // Open letter
  document.querySelectorAll(".btn-open").forEach(function(b){
    b.addEventListener("click",function(ev){
      ev.stopPropagation();
      const id=b.dataset.id;
      let deals,type;
      if(S.tab==="decline"){deals=S.declineDeals;type="decline";}
      else if(S.tab==="defer"){deals=S.deferDeals;type="defer";}
      else {deals=S.approveDeals;type="approve";}
      const d=deals.find(function(x){return x.id===id;});
      if(d){
        const next={phase:"letter",selected:d,selectedType:type,emailTo:d.supplierEmail||"",sending:false,sendResult:null};
        if(type==="approve"){next.appEdit=buildAppEdit(d);}
        set(next);
      }
    });
  });
  document.querySelectorAll(".deal-row").forEach(function(r){
    r.addEventListener("click",function(){
      const id=r.dataset.id;
      let deals,type;
      if(S.tab==="decline"){deals=S.declineDeals;type="decline";}
      else if(S.tab==="defer"){deals=S.deferDeals;type="defer";}
      else {deals=S.approveDeals;type="approve";}
      const d=deals.find(function(x){return x.id===id;});
      if(d){
        const next={phase:"letter",selected:d,selectedType:type,emailTo:d.supplierEmail||"",sending:false,sendResult:null};
        if(type==="approve"){next.appEdit=buildAppEdit(d);}
        set(next);
      }
    });
  });

  // Approval letter — bind editable fields without re-rendering
  if(S.phase==="letter"&&S.selectedType==="approve"&&S.appEdit){
    function bindField(id,key){
      const el=document.getElementById(id);
      if(el)el.addEventListener("input",function(ev){S.appEdit[key]=ev.target.value;});
    }
    bindField("ap-date","date");
    bindField("ap-supemail","supplierEmail");
    bindField("ap-attention","attention");
    bindField("ap-supplier","supplier");
    bindField("ap-client","clientName");
    bindField("ap-regno","regNo");
    bindField("ap-equipment","equipmentSchedule");
    bindField("ap-payout","payout");
    bindField("ap-settlement","settlement");
    bindField("ap-escalation","escalation");
    bindField("ap-rental","rental");
    bindField("ap-factor","factor");
    bindField("ap-period","period");
    bindField("ap-rentalincl","rentalInclIns");
    bindField("ap-docfee","docFee");
    bindField("ap-cond1","cond1");
    bindField("ap-cond2","cond2");

    // Checkboxes — toggle without full re-render
    document.querySelectorAll(".cbx[data-cbx]").forEach(function(cb){
      cb.addEventListener("click",function(){
        const idx=parseInt(cb.dataset.cbx,10);
        S.appEdit.checks[idx]=!S.appEdit.checks[idx];
        cb.classList.toggle("checked");
      });
    });

    // Auto-resize textareas
    ["ap-equipment","ap-cond1","ap-cond2"].forEach(function(id){
      const ta=document.getElementById(id);
      if(ta){
        function resize(){ta.style.height="auto";ta.style.height=(ta.scrollHeight)+"px";}
        ta.addEventListener("input",resize);
        resize();
      }
    });
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
S.token=localStorage.getItem(STORE_KEY)||"";
if(S.token){load();}else{render();}
</script>
</body>
</html>
